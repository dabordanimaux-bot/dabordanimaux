# =====================================================================
#  ANIMAUX D'ABORD — Garder les rappels actifs
#  ---------------------------------------------------------------------
#  GitHub désactive les workflows planifiés d'un dépôt public au bout de
#  60 jours sans le moindre commit. Seuls les commits comptent : ouvrir
#  une issue ou créer un tag ne remet pas le compteur à zéro.
#
#  Ce robot écrit une date dans un fichier le 1er de chaque mois et le
#  commite. Le compteur repart, et les rappels continuent indéfiniment.
#
#  Rien à configurer : il utilise le jeton fourni par GitHub.
# =====================================================================
name: Garder les rappels actifs

on:
  schedule:
    - cron: "17 3 1 * *"     # le 1er de chaque mois, 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: garder-actif
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Écrire la date et commiter
        run: |
          mkdir -p .github
          date -u +"Dernière activité automatique : %Y-%m-%d %H:%M UTC" > .github/derniere-activite.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/derniere-activite.txt
          if git diff --staged --quiet; then
            echo "Rien à commiter."
            exit 0
          fi
          git commit -m "Garder les workflows planifiés actifs"
          git push
